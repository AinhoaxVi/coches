<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#17231f" />
  <meta name="description" content="Garaje, mantenimiento y orientación de averías para tu coche." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <link rel="stylesheet" href="./styles.css" />
  <title>MotorClaro</title>
</head>
<body>
  <div id="appShell" class="app-shell">
    <header class="topbar">
      <button class="brand" data-go="home" aria-label="Ir al inicio">
        <span class="brand-mark">M</span>
        <span>MotorClaro</span>
      </button>
      <button id="profileButton" class="avatar" aria-label="Editar perfil">T</button>
    </header>

    <main id="main" class="main" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Navegación principal">
      <button class="nav-item active" data-view="home"><span>⌂</span><small>Inicio</small></button>
      <button class="nav-item" data-view="garage"><span>◇</span><small>Garaje</small></button>
      <button class="nav-item nav-main" data-view="diagnosis"><span>✦</span><small>Diagnóstico</small></button>
      <button class="nav-item" data-view="maintenance"><span>✓</span><small>Mantenimiento</small></button>
    </nav>
  </div>

  <div id="sheet" class="sheet-backdrop hidden" role="dialog" aria-modal="true">
    <section class="sheet">
      <div class="sheet-handle"></div>
      <div id="sheetContent"></div>
    </section>
  </div>

  <div id="toast" class="toast hidden" role="status"></div>
  <script src="./app.js"></script>
</body>
</html>
